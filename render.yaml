databases:
  - name: hrms-db
    plan: free
    region: frankfurt

services:
  - type: web
    name: hrms-api
    runtime: node
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: npm ci && npm run build && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: hrms-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: APP_PUBLIC_URL
        sync: false
      - key: BLOB_READ_WRITE_TOKEN
        sync: false
      - key: BLOB_ACCESS
        value: public
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
