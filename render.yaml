databases:
  - name: hrms-db
    plan: free

services:
  - type: web
    name: hrms-app
    env: node
    plan: free
    buildCommand: npm ci && npm --prefix backend run prisma:push && npm run build
    startCommand: npm run start --prefix backend
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hrms-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"
